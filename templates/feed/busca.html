<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Busca</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#080808;--surface:#111111;--border:#222222;--text:#f0f0f0;--muted:#555555;--accent:#e8ff57;--blue:#1d9bf0;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
    header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:10px;padding:0 16px;height:56px;background:rgba(8,8,8,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
    header a{color:var(--blue);text-decoration:none;font-size:1.2rem;}
    .busca-form{flex:1;display:flex;}
    .busca-form input{width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:9999px;padding:8px 14px;font-size:0.9rem;font-family:inherit;outline:none;transition:border-color 0.2s;}
    .busca-form input:focus{border-color:var(--accent);}
    .container{max-width:560px;margin:0 auto;padding:72px 0 40px;}
    .resultado{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);text-decoration:none;transition:background 0.15s;}
    .resultado:hover{background:rgba(255,255,255,0.03);}
    .avatar{width:44px;height:44px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--accent);text-transform:uppercase;flex-shrink:0;}
    .resultado-nome{font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;color:var(--text);}
    .resultado-nome::before{content:'@';color:var(--accent);}
    .vazio{text-align:center;color:var(--muted);padding:60px 20px;font-size:0.9rem;}
  </style>
</head>
<body>
  <header>
    <a href="{% url 'feed' %}">←</a>
    <form class="busca-form" action="{% url 'busca' %}" method="GET">
      <input type="text" name="q" value="{{ query }}" placeholder="Buscar usuário..." autocomplete="off" autofocus />
    </form>
  </header>

  <div class="container">
    {% if query %}
      {% for usuario in resultados %}
        <a href="{% url 'perfil' usuario.username %}" class="resultado">
          <div class="avatar">{{ usuario.username|slice:":1" }}</div>
          <div class="resultado-nome">{{ usuario.username }}</div>
        </a>
      {% empty %}
        <div class="vazio">Nenhum usuário encontrado para "{{ query }}".</div>
      {% endfor %}
    {% else %}
      <div class="vazio">Digite um nome para buscar.</div>
    {% endif %}
  </div>
</body>
</html>
